name: Deploy learner portal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and assemble static site
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          grep -q 'Welcome, <span>Luca.</span>' index.html
          grep -q 'Download my IDR' index.html
          mkdir -p _site
          cp index.html _site/index.html
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
