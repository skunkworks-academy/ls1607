name: Validate learner portal

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required learner experience
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          grep -q 'Welcome, <span>Luca.</span>' index.html
          grep -q 'Download my IDR' index.html
          grep -q 'id="radar"' index.html
          grep -q 'Starter weekly timetable' index.html
          grep -q '12-month roadmap workflow' index.html
          grep -q 'Review and sign-off' index.html
          grep -q 'Luca_Sprunt_Individual_Development_Roadmap.docx' index.html
          ! grep -q 'lucasprunt@gmail.com' index.html
          ! grep -q '493240070' index.html
          echo 'Learner portal validation passed.'
