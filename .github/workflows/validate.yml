name: Validate Docusaurus IDR

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate source and production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run source, privacy and UX checks
        run: npm run validate
      - name: Build production site
        run: npm run build
      - name: Verify production output
        shell: bash
        run: |
          set -euo pipefail
          test -s build/index.html
          test -s build/sitemap.xml
          grep -q 'Welcome' build/index.html
          grep -q 'Download my IDR' build/index.html
          ! grep -R -q 'lucasprunt@gmail.com' build
          ! grep -R -q '493240070' build
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-production-build
          path: build
          if-no-files-found: error
          retention-days: 7
