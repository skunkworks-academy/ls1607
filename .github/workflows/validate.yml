name: Validate Docusaurus IDR

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate required IDR content
        shell: bash
        run: |
          set -euo pipefail
          test -s package.json
          test -s docusaurus.config.js
          test -s src/pages/index.jsx
          test -s docs/intro.md
          test -s docs/execution-roadmap.md
          test -s docs/portfolio.md
          test -s docs/secure-agent.md
          grep -q 'Luca Sprunt' src/pages/index.jsx
          grep -q 'Download editable IDR' src/pages/index.jsx
          grep -q 'Luca_Sprunt_Individual_Development_Roadmap.docx' docusaurus.config.js
          grep -q 'mermaid: true' docusaurus.config.js
          ! grep -R -q 'lucasprunt@gmail.com' src docs docusaurus.config.js
          ! grep -R -q '493240070' src docs docusaurus.config.js

      - name: Build site
        run: npm run build
